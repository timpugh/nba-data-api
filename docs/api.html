<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello World API Reference</title>
    <style>
      body { margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <script
      id="api-reference"
      data-url="openapi.json"
      data-configuration='{"defaultHttpClient":{"targetKey":"python","clientKey":"requests"}}'
    ></script>
    <!--
      Scalar API Reference standalone bundle, pinned to a specific version
      with an SRI hash. If jsdelivr ever serves tampered bytes, the browser
      will refuse to execute the script. Bump the version and recompute the
      hash with:
        curl -sSL https://cdn.jsdelivr.net/npm/@scalar/api-reference@<version>/dist/browser/standalone.js \
          | openssl dgst -sha384 -binary | openssl base64 -A
    -->
    <script
      src="https://cdn.jsdelivr.net/npm/@scalar/api-reference@1.52.3/dist/browser/standalone.js"
      integrity="sha384-a6lVW8cVFPoDBh+KvKGb0wNyPe0VM9D9bJU8yZeenFroXKmRAdunHuClYMKFe56L"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </body>
</html>
